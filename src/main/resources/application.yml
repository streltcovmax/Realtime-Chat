server:
  port: 8081
  forward-headers-strategy: native

app:
  base-url: ${APP_BASE_URL:http://localhost:8081}

spring:
  application:
    name: chat

  security:
    oauth2:
      client:
        registration:
          keycloak :
            client-id: ${KC_CLIENT_ID:chat-client}
            client-secret: ${KC_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
            scope: openid, profile
        provider:
          keycloak:
            issuer-uri: ${KC_ISSUER_URI}
            user-name-attribute: preferred_username

  web:
    resources:
      static-locations: classpath:/

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5430}/${DB_NAME:chat_dev_db}
    username: ${DB_USERNAME:kiribirka}
    password: ${DB_PASSWORD:pass}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
