server:
  port: 8081
  forward-headers-strategy: native

app:
  base-url: ${APP_BASE_URL:http://localhost:8081}
  security:
    websocket-allowed-origins: ${APP_WEBSOCKET_ALLOWED_ORIGINS:http://localhost:8081}

opensearch:
  enabled: ${OPENSEARCH_ENABLED:true}
  base-url: ${OPENSEARCH_BASE_URL:https://127.0.0.1:9200}
  index-messages: ${OPENSEARCH_INDEX_MESSAGES:chat-messages}
  insecure-ssl: ${OPENSEARCH_INSECURE_SSL:true}
  username: ${OPENSEARCH_USERNAME:admin}
  password: ${OPENSEARCH_PASSWORD:KWL9quAzK68R}

analytics:
  clickhouse:
    enabled: ${ANALYTICS_CLICKHOUSE_ENABLED:true}
    base-url: ${ANALYTICS_CLICKHOUSE_BASE_URL:http://127.0.0.1:8123}
    database: ${ANALYTICS_CLICKHOUSE_DATABASE:chat_analytics}
    table: ${ANALYTICS_CLICKHOUSE_TABLE:events}
    username: ${ANALYTICS_CLICKHOUSE_USERNAME:${CLICKHOUSE_USER:default}}
    password: ${ANALYTICS_CLICKHOUSE_PASSWORD:${CLICKHOUSE_PASSWORD:password}}

spring:
  application:
    name: chat

  security:
    oauth2:
      client:
        registration:
          keycloak :
            client-id: ${KC_CLIENT_ID:chat-client}
            client-secret: ${KC_CLIENT_SECRET:vxnZ89TZ8cSBLyDw86S3VqneXQWUdHnU}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
            scope: openid, profile
        provider:
          keycloak:
            authorization-uri: ${KC_AUTHORIZATION_URI:http://localhost:8080/realms/chat_realm/protocol/openid-connect/auth}
            token-uri: ${KC_TOKEN_URI:http://localhost:8080/realms/chat_realm/protocol/openid-connect/token}
            jwk-set-uri: ${KC_JWK_SET_URI:http://localhost:8080/realms/chat_realm/protocol/openid-connect/certs}
            user-info-uri: ${KC_USER_INFO_URI:http://localhost:8080/realms/chat_realm/protocol/openid-connect/userinfo}
            user-name-attribute: preferred_username

  web:
    resources:
      static-locations: classpath:/

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5430}/${DB_NAME:chat_dev_db}
    username: ${DB_USERNAME:kiribirka}
    password: ${DB_PASSWORD:pass}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
