<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" spellcheck="false">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" media="all" href="/static/css/style.css">
    <link rel="icon" type="image/x-icon" href="/static/images/icon_colored.ico">
    <title>CHAT</title>
</head>
<body th:data-csrf-token="${csrfToken}" th:data-csrf-header="${csrfHeaderName}">

<div class="login r hidden" id="login-page">
    <h2>ВОЙТИ</h2>
    <form id="login-form">
        <div class="inputContainer">
            <input autocomplete="off" type="text" id="fullname-input" name="fullname" placeholder="имя"
                   title="введите имя" class="r animated" required>
        </div>
        <div class="inputContainer">
            <input autocomplete="off" type="text" id="username-input" name="username" placeholder="никнейм"
                   title="введите никнейм" class="r animated" required>
        </div>
        <span class="hidden">debug</span>
        <button class="r" id="login-button-submit">далее</button>
    </form>
</div>

<div class="chats" id="chat-page">
    <div class="chats-panel br-r">
        <div class="search-input-wrapper">
            <input autocomplete="off" type="text" id="searchUsername" name="search" placeholder="поиск" class="r">
            <button type="button" id="search-clear-btn" class="search-clear-btn hidden" title="Очистить">×</button>
        </div>
        <div id="search-results-container" class="search-results-container hidden">
            <p class="search-results-label">Найдено:</p>
            <p id="search-no-results" class="search-no-results hidden">Ничего не найдено</p>
            <ul id="foundUsers"></ul>
        </div>
        <div id="chats-list-container" class="chats-list-container">
            <ul id="chats-list">
            </ul>
        </div>
        <div class="footer-panel">
            <button class="current-user-footer-container" id="this-profile-button">
                <span id="connected-user-avatar" class="chat-avatar r"></span>
                <span id="connected-user-fullname"></span>
            </button>
            <button id="logout-button">
              <img src="/static/images/exit.svg" alt="exit">
            </button>
        </div>
    </div>

    <div class="chat-area-wrap">
        <div class="chat-area hidden" id="chat-area">
            <div class="br-b" id="chat-header-info">
                <div class="chat-avatar r" id="selected-chat-avatar"></div>
                <div>
                    <p id="chat-header-username"></p>
                    <span id="chat-header-status"></span>
                </div>
            </div>
            <div id="chat-messages" class="r">
            </div>
            <form id="messageForm" name="messageForm" class="br-t"
                  th:data-max-message-length="${maxMessageLength}">
                <p id="message-length-error" class="message-length-error hidden" role="alert" aria-live="polite"></p>
                <div class="message-input">
                    <textarea autocomplete="off" id="messageInput" placeholder="введите сообщение..."
                              class="r" rows="1"></textarea>
                    <button type="button" class="r" id="send-message-button">></button>
                </div>
            </form>
        </div>
        <div class="info-message r overlay" id="pick-chat-message"> выберите чат!</div>
        <div class="info-message r overlay hidden" id="empty-chat-message"> здесь пока пусто...</div>
    </div>

    <div class="sidepanel br-l">
    </div>
</div>

<div class="user-form hidden" id="search-page">
    <h2>Найти пользователей</h2>
</div>


<script src="/static/js/lib/sockjs.min.js"></script>
<script src="/static/js/lib/stomp.min.js"></script>
<script type="module" src="/static/js/user.js"></script>
<script type="module" src="/static/js/script.js"></script>
</body>
</html>
