version: '3.8'

services:
  db:
    image: postgres:16
    container_name: messenger_db
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_production_data:/var/lib/postgresql/data
    restart: always

  keycloak:
    image: ${DOCKER_USER}/keycloak-custom:latest
    container_name: keycloak
    command: start
    environment:
      KC_HTTP_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${DB_USERNAME}
      KC_DB_PASSWORD: ${DB_PASSWORD}

      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASS}

      KC_HOSTNAME: auth.pelmesh.su
      KC_PROXY_HEADERS: xforwarded # Обязательно для работы за Nginx/Proxy
      KC_SPI_THEME_STATIC_MAX_AGE: -1
      KC_SPI_THEME_CACHE_THEMES: false
      KC_SPI_THEME_CACHE_TEMPLATES: false
    depends_on:
      - db
    restart: always

  app:
    image: ${DOCKER_USER}/messenger_app:${APP_IMAGE_TAG:-latest}
    container_name: messenger_app
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KC_ISSUER_URI: ${KC_ISSUER_URI}
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET}
      OPENSEARCH_ENABLED: ${OPENSEARCH_ENABLED:-true}
      OPENSEARCH_BASE_URL: ${OPENSEARCH_BASE_URL:-https://opensearch:9200}
      OPENSEARCH_INDEX_MESSAGES: ${OPENSEARCH_INDEX_MESSAGES:-chat-messages}
      OPENSEARCH_INSECURE_SSL: ${OPENSEARCH_INSECURE_SSL:-false}
      OPENSEARCH_USERNAME: ${OPENSEARCH_USERNAME:-admin}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD}
      ANALYTICS_CLICKHOUSE_ENABLED: ${ANALYTICS_CLICKHOUSE_ENABLED:-true}
      ANALYTICS_CLICKHOUSE_BASE_URL: ${ANALYTICS_CLICKHOUSE_BASE_URL:-http://clickhouse:8123}
      ANALYTICS_CLICKHOUSE_DATABASE: ${ANALYTICS_CLICKHOUSE_DATABASE:-chat_analytics}
      ANALYTICS_CLICKHOUSE_TABLE: ${ANALYTICS_CLICKHOUSE_TABLE:-events}
      ANALYTICS_CLICKHOUSE_USERNAME: ${CLICKHOUSE_USER:-default}
      ANALYTICS_CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      - db
      - keycloak
      - clickhouse
      - opensearch
    networks:
      - default
      - opensearch-net
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - keycloak
    restart: always

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "127.0.0.1:8123:8123"
    environment:
      CLICKHOUSE_DB: ${ANALYTICS_CLICKHOUSE_DATABASE:-chat_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      ANALYTICS_CLICKHOUSE_DATABASE: ${ANALYTICS_CLICKHOUSE_DATABASE:-chat_analytics}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - clickhouse
    restart: always

  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_IMAGE_TAG:-2}
    container_name: opensearch
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "127.0.0.1:9200:9200"
    networks:
      - opensearch-net

volumes:
  postgres_production_data:
  opensearch-data:
  clickhouse-data:
  clickhouse-logs:
  grafana-data:

networks:
  opensearch-net: