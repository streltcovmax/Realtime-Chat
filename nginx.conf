events {}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    proxy_buffer_size   128k;
    proxy_buffers       4 256k;
    proxy_busy_buffers_size 256k;

    #ОБЩИЙ РЕДИРЕКТ С HTTP НА HTTPS
    server {
        listen 80;
        server_name pelmesh.su auth.pelmesh.su grafana.pelmesh.su;
        return 301 https://$host$request_uri;
    }

    #KEYCLOAK (HTTPS)
    server {
        listen 443 ssl;
        server_name auth.pelmesh.su;

        ssl_certificate /etc/letsencrypt/live/pelmesh.su/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pelmesh.su/privkey.pem;

        location / {
            set $keycloak_upstream http://keycloak:8080;
            proxy_pass $keycloak_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    #SPRING APP (HTTPS)
    server {
        listen 443 ssl;
        server_name pelmesh.su;

        ssl_certificate /etc/letsencrypt/live/pelmesh.su/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pelmesh.su/privkey.pem;

        location /ws/ {
            set $app_upstream http://app:8081;
            proxy_pass $app_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_buffering off;
        }

        location / {
            set $app_upstream http://app:8081;
            proxy_pass $app_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name grafana.pelmesh.su;

        ssl_certificate /etc/letsencrypt/live/grafana.pelmesh.su/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/grafana.pelmesh.su/privkey.pem;

        location / {
            set $grafana_upstream http://grafana:3000;
            proxy_pass $grafana_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}